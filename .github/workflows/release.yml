name: Release (test-prompts)

on:
  push:
    tags: ['test-prompts/v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
    defaults:
      run:
        working-directory: test/prompts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Install app dependencies
        shell: bash
        run: |
          grep -v 'llama-cpp-python' requirements.txt | pip install -r /dev/stdin
          if [ "${{ runner.os }}" = "macOS" ]; then
            CMAKE_ARGS="-DGGML_METAL=ON" pip install llama-cpp-python[server] --no-cache-dir
          else
            pip install llama-cpp-python[server]
          fi

      - name: Build app with PyInstaller
        run: pyinstaller test-prompts-app.spec

      - name: Build installer with PyInstaller
        run: pyinstaller test-prompts-installer.spec

      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/release
          OS_NAME=${{ runner.os == 'Linux' && 'linux' || 'macos' }}
          cp dist/test-prompts-app "dist/release/test-prompts-app-${OS_NAME}"
          cp dist/test-prompts-installer "dist/release/test-prompts-installer-${OS_NAME}"

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist/release
          cp dist/test-prompts-app.exe dist/release/test-prompts-app-windows.exe
          cp dist/test-prompts-installer.exe dist/release/test-prompts-installer-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: test-prompts-${{ runner.os }}
          path: test/prompts/dist/release/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Set executable permissions
        run: |
          chmod +x test-prompts-Linux/* 2>/dev/null || true
          chmod +x test-prompts-macOS/* 2>/dev/null || true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: test-prompts-*/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
